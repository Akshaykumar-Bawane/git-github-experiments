apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullet04-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bullet04
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: bullet04
    spec:
      containers:
      - name: bullet04-container
        image: 945695383447.dkr.ecr.ap-south-1.amazonaws.com/bullet04-app:latest
        ports:
        - containerPort: 3000

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
